DYNAMICAL_CATALOG:
  default_model: GEFS
  GEFS:
    dataset_id: "noaa-gefs-forecast-35-day"
    delay_hours: 6
    forecast_selection: pad
    max_run_age_hours: 48
    lead_time_hours:
      start: 0
      end: 336
    bbox: *STUDY_CLIP_GEO_BBOX
    variables:
      - source: precipitation_surface
        name: precipitation_flux
        standard_name: precipitation_flux
        long_name: Precipitation rate
        units: kg m-2 s-1
      - source: temperature_2m
        name: air_temperature
        standard_name: air_temperature
        long_name: 2 metre air temperature
        units: degree_Celsius
    output_filename_template: "dynamical_gefs_{run_time:%Y%m%d%H%M}.nc"
    xr_open_kwargs:
      chunks: null
    compression:
      zlib: true
      complevel: 1
  HRRR:
    dataset_id: "noaa-hrrr-forecast-48-hour"
    delay_hours: 6
    forecast_selection: pad
    max_run_age_hours: 12
    lead_time_hours:
      start: 0
      end: 48
    bbox: *STUDY_CLIP_GEO_BBOX
    variables:
      - source: precipitation_surface
        name: precipitation_flux
        standard_name: precipitation_flux
        long_name: Precipitation rate
        units: kg m-2 s-1
      - source: temperature_2m
        name: air_temperature
        standard_name: air_temperature
        long_name: 2 metre air temperature
        units: degree_Celsius
    output_filename_template: "dynamical_hrrr_{run_time:%Y%m%d%H%M}.nc"
    xr_open_kwargs:
      chunks: null
    compression:
      zlib: true
      complevel: 1
  # ECMWF IFS ENS via dynamical.org (51 members; 00 UTC; lead 0–360 h). See CLI --model ECMWF_IFS_ENS.
  ECMWF_IFS_ENS:
    dataset_id: "ecmwf-ifs-ens-forecast-15-day-0-25-degree"
    delay_hours: 12
    forecast_selection: pad
    max_run_age_hours: 48
    lead_time_hours:
      start: 0
      end: 360
    bbox: *STUDY_CLIP_GEO_BBOX
    variables:
      - source: precipitation_surface
        name: precipitation_flux
        standard_name: precipitation_flux
        long_name: Precipitation rate
        units: kg m-2 s-1
      - source: temperature_2m
        name: air_temperature
        standard_name: air_temperature
        long_name: 2 metre air temperature
        units: degree_Celsius
    output_filename_template: "dynamical_ecmwf_ifs_ens_{run_time:%Y%m%d%H%M}.nc"
    xr_open_kwargs:
      chunks: null
    compression:
      zlib: true
      complevel: 1

