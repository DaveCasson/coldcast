# General settings
output_dir: "./work"
logger_name: "coldcast"
log_file: "coldcast.log"
log_xml_file: "coldcast_log.xml"
xml_log: false
run_info_file: ""
run_info_netcdf: ""
fews_name_space: "http://www.wldelft.nl/fews/PI"
max_num_threads: 8
wgrib2_path: "./bin/wgrib2.exe"

# Default geographic extent (``lon_min``, ``lon_max``, ``lat_min``, ``lat_max``). CDS sources also
# accept nested ``bounding_box`` / ``bbox`` as ``[North, West, South, East]``. Where supported, per-source
# ``bbox`` / ``clip_bbox`` merges with this (product keys override).
bounding_box:
  lon_min: -120
  lon_max: -110
  lat_min: 49
  lat_max: 60

# NOMADS Grib Filter subregion (native ``leftlon`` / ``rightlon`` / ``toplat`` / ``bottomlat``).
NOAA_NOMADS_ALASKA_BBOX: &NOAA_NOMADS_ALASKA_BBOX
  leftlon: 190
  rightlon: 240
  toplat: 75
  bottomlat: 50

STUDY_CLIP_GEO_BBOX: &STUDY_CLIP_GEO_BBOX
  lon_min: -117
  lon_max: -113
  lat_min: 50
  lat_max: 52

# Example large North America clip (used by HREPA percentile FEWS templates; ECMWF model YAML).
ECMWF_DEFAULT_CLIP_BBOX: &ECMWF_DEFAULT_CLIP_BBOX
  lon_min: -170.0
  lon_max: -50.0
  lat_min: 10.0
  lat_max: 80.0

ECCC_API:
  url_base: https://api.weather.gc.ca/collections
  # Per-request page size for /items (GeoMet returns at most 10000 features per response).
  limit: 10000
  # Follow OGC ``rel=next`` until all features for each station are retrieved.
  fetch_all_pages: true
  # Safety cap on HTTP round-trips per station (10000 pages ≈ 100M rows).
  max_pagination_pages: 5000
  # Newest timestamps first in exported CSV (wide and long).
  sort_output_datetime_descending: true
  time_range: ""
  http_timeout_seconds: 120
  station_csv_hydro: "ECCC_API_Stations_Hydro.csv"
  station_csv_meteo: "ECCC_API_Stations_Meteo.csv"
  url_template: "{url_base}/{collection}/items?STATION_NUMBER={station}&limit={limit}&datetime={time_range}"
  filename_template: "{station}_{collection}.csv"
  fews_csv:
    layout: wide
    delimiter: ","
    utf8_bom: false
    table_datetime_column: DATETIME
    value_column_names: {}
    location_column: locationId
    parameter_column: parameterId
    datetime_column: dateTime
    value_column: value
    unit_column: unit
    quality_column: qualityFlag
    parameter_id_map: {}
  collections:
    hydrometric-realtime:
      collection: hydrometric-realtime
      station_list: hydro
      datetime_column: DATETIME
      download_variables:
        - DISCHARGE
        - LEVEL
    hydrometric-daily-mean:
      collection: hydrometric-daily-mean
      station_list: hydro
      datetime_column: DATE
      download_variables:
        - DISCHARGE
        - LEVEL
    swob-realtime:
      collection: swob-realtime
      station_list: meteo
      url_template: "{url_base}/{collection}/items?f=json&msc_id-value={station}&limit={limit}&datetime={time_range}&properties=air_temp,air_temp-uom,air_temp-qa,pcpn_amt_pst1hr,pcpn_amt_pst1hr-uom,pcpn_amt_pst1hr-qa,rnfl_amt_pst1hr,rnfl_amt_pst1hr-uom,date_tm-value,msc_id-value,stn_nam-value"
      filename_template: "{station}_swob-realtime.csv"
      datetime_column: date_tm-value
      download_variables:
        - air_temp
        - pcpn_amt_pst1hr
        - rnfl_amt_pst1hr
    climate-daily:
      collection: climate-daily
      station_list: meteo
      station_column: CLIMATE_IDENTIFIER
      url_template: "{url_base}/{collection}/items?f=json&CLIMATE_IDENTIFIER={station}&limit={limit}&datetime={time_range}"
      filename_template: "{station}_climate-daily.csv"
      datetime_column: LOCAL_DATE
      download_variables:
        - MAX_TEMPERATURE
        - MIN_TEMPERATURE
        - MEAN_TEMPERATURE
        - TOTAL_PRECIPITATION
    climate-hourly:
      collection: climate-hourly
      station_list: meteo
      station_column: CLIMATE_IDENTIFIER
      url_template: "{url_base}/{collection}/items?f=json&CLIMATE_IDENTIFIER={station}&limit={limit}&datetime={time_range}"
      filename_template: "{station}_climate-hourly.csv"
      datetime_column: LOCAL_DATE
      download_variables:
        - TEMP
        - DEW_POINT_TEMP
        - RELATIVE_HUMIDITY
        - PRECIP_AMOUNT
        - STATION_PRESSURE
        - WIND_DIRECTION
        - WIND_SPEED

ECCC_WATER_OFFICE:
  url_base: "https://wateroffice.ec.gc.ca/services/real_time_data/csv/inline"
  station_csv: "ECCC_API_Stations_Hydro.csv"
  station_column: ID
  # Real-time parameter codes (see Water Office station metadata).
  parameters:
    - "6"
  # Set both start_date and end_date (format YYYY-MM-DD HH:MM:SS), or leave empty and use days_back from now (UTC).
  start_date: ""
  end_date: ""
  days_back: 7300
  filename_template: "{station}_water_office.csv"
  # TLS: if you see CERTIFICATE_VERIFY_FAILED (common on Windows), try pip install -U certifi, or pip install pip-system-certs, or set http_ca_bundle to a PEM file. Last resort: http_verify_ssl: false (insecure).
  http_verify_ssl: true
  http_ca_bundle: ""

ALBERTA_API:
  url_base: "https://rivers.alberta.ca/WiskiLiveDataService/Download"
  # "auto" = same calendar month/day as today, default_years_back years earlier (see alberta_api._resolve_from_date).
  from_date: "auto"
  default_years_back: 2
  to_date: "latest"
  mapping_csv: "ALBERTA_API_Stations.csv"
  remote_filename_suffix: "C.Corrected-Sensor"
  zip: true
  json: true
  # Write the HTTP body to output_dir as <Station>_<Parameter>.zip (or .download) before parsing.
  save_raw_response: true
  http_timeout_seconds: 120
  fews_csv:
    layout: wide
    delimiter: ","
    utf8_bom: false
    table_datetime_column: DATETIME
    value_column_names: {}
    location_column: locationId
    parameter_column: parameterId
    datetime_column: dateTime
    value_column: value
    unit_column: unit
    quality_column: qualityFlag
    parameter_id_map: {}
    default_unit: ""
    default_quality_flag: ""

NOAA_HRRR:
  url_base: "https://nomads.ncep.noaa.gov/cgi-bin/"
  filter_script: "filter_hrrrak_2d.pl"
  domain: "alaska"
  domain_suffix: ".ak"
  product: "wrfsfcf"
  delay_hours: 6
  cycle_interval_hours: 3
  bbox: *NOAA_NOMADS_ALASKA_BBOX
  dir_template: "/hrrr.{date}/{domain}"
  file_template: "hrrr.t{cycle_hour}z.{product}{forecast_hour:02d}{domain_suffix}.grib2"
  forecast_hours:
    start: 0
    end: 24
    step: 1
  variables:
    - var: PRATE
      level: surface
    - var: TMP
      level: 2_m_above_ground

NOAA_GFS:
  url_base: "https://nomads.ncep.noaa.gov/cgi-bin/"
  filter_script: "filter_gfs_0p25.pl"
  delay_hours: 6
  cycle_interval_hours: 6
  bbox: *NOAA_NOMADS_ALASKA_BBOX
  dir_template: "/gfs.{date}/{cycle_hour}/atmos"
  file_template: "gfs.t{cycle_hour}z.pgrb2.0p25.f{forecast_hour:03d}"
  download_suffix: ".grib2"
  forecast_hours:
    - 0
    - 3
    - 6
    - 9
    - 12
    - 15
    - 18
    - 21
    - 24
  variables:
    - var: PRATE
      level: surface
    - var: TMP
      level: 2_m_above_ground
    - var: PRMSL
      level: mean_sea_level
    - var: UGRD
      level: 10_m_above_ground
    - var: VGRD
      level: 10_m_above_ground

NOAA_GEFS:
  url_base: "https://nomads.ncep.noaa.gov/cgi-bin/"
  filter_script: "filter_gefs_atmos_0p25s.pl"
  delay_hours: 6
  cycle_interval_hours: 6
  bbox: *NOAA_NOMADS_ALASKA_BBOX
  dir_template: "/gefs.{date}/{cycle_hour}/atmos/"
  file_template: "gep{member}.t{cycle_hour}z.pgrb2s.0p25.f{forecast_hour:03d}"
  members:
    start: 0
    end: 30
    step: 1
  forecast_hours:
    start: 0
    end: 24
    step: 6
  variables:
    - var: APCP  # PRATE not available in current NOMADS GEFS 0.25s filter
      level: surface
    - var: TMP
      level: 2_m_above_ground

